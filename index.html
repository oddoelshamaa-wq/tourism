<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رويال ترافيل | الحجز والدفع الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --gold: #d4af37; --dark: #020617; --card: #1e293b; --accent: #38bdf8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: var(--dark); color: white; overflow-x: hidden; }

        header { padding: 20px 0; border-bottom: 2px solid var(--gold); background: rgba(2,6,23,0.95); position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(10px); }
        .container { width: 92%; max-width: 1200px; margin: auto; }
        .nav { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 28px; font-weight: 900; color: var(--gold); text-decoration: none; }

        /* قسم البحث والفلتر */
        .search-bar { background: #0f172a; padding: 30px 0; border-bottom: 1px solid #1e293b; }
        .filter-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 15px; }
        input, select { padding: 12px; border-radius: 10px; background: #1e293b; border: 1px solid #334155; color: white; outline: none; }

        /* شبكة الفنادق */
        .hotels-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 30px; padding: 50px 0; }
        .card { background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: 0.4s; cursor: pointer; }
        .card:hover { transform: translateY(-10px); border-color: var(--gold); }
        .card img { width: 100%; height: 230px; object-fit: cover; }
        .card-body { padding: 20px; }

        /* المودال (نافذة الحجز) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 5000; overflow-y: auto; padding: 20px; }
        .modal-content { background: #0f172a; max-width: 1100px; margin: 10px auto; border-radius: 30px; padding: 40px; border: 1px solid var(--gold); position: relative; }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 40px; color: var(--gold); cursor: pointer; }

        /* جاليري الصور 3D */
        .image-gallery { display: flex; gap: 15px; overflow-x: auto; padding: 20px 0; margin-bottom: 20px; perspective: 1000px; }
        .image-gallery img { width: 280px; height: 380px; object-fit: cover; border-radius: 15px; transform: rotateY(-15deg); transition: 0.4s; border: 2px solid #334155; }
        .image-gallery img:hover { transform: rotateY(0deg) scale(1.05); border-color: var(--gold); }

        .booking-layout { display: grid; grid-template-columns: 1.5fr 1fr; gap: 40px; }
        .form-side { background: #1e293b; padding: 30px; border-radius: 25px; border: 1px solid var(--gold); }

        /* الدفع المتغير */
        .pay-selector { display: flex; gap: 10px; margin: 20px 0; }
        .pay-selector label { flex: 1; text-align: center; padding: 15px; background: #0f172a; border: 1px solid #334155; border-radius: 12px; cursor: pointer; transition: 0.3s; }
        .pay-selector input { display: none; }
        .pay-selector input:checked + span { color: var(--gold); font-weight: bold; }
        .pay-selector label:has(input:checked) { border-color: var(--gold); background: rgba(212, 175, 55, 0.1); }

        .payment-input-area { margin-top: 20px; display: none; border-top: 1px solid #334155; padding-top: 20px; }
        .payment-input-area.active { display: block; animation: fadeIn 0.5s; }

        .total-price { font-size: 2.2rem; color: var(--gold); font-weight: 900; text-align: center; margin: 20px 0; }
        .btn-confirm { width: 100%; padding: 20px; background: var(--gold); color: black; border: none; border-radius: 15px; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .btn-confirm:hover { background: white; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <div class="container nav">
            <a href="index.html" class="logo">ROYAL TRAVEL</a>
            <a href="admin.html" style="color:var(--gold); text-decoration:none;"><i class="fas fa-user-shield"></i> لوحة الإدارة</a>
        </div>
    </header>

    <!-- قسم الفلتر -->
    <section class="search-bar">
        <div class="container filter-grid">
            <input type="text" id="searchInput" placeholder="ابحث باسم الفندق..." oninput="window.filterHotels()">
            <select id="regionFilter" onchange="window.filterHotels()">
                <option value="">كل المناطق</option>
            </select>
        </div>
    </section>

    <div class="container">
        <div id="hotelsGrid" class="hotels-grid"></div>
    </div>

    <!-- نافذة الحجز -->
    <div id="bookModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="window.closeM()">&times;</span>
            <div id="mGallery" class="image-gallery"></div>

            <div class="booking-layout">
                <div class="info-side">
                    <h2 id="mName" style="color:var(--gold); font-size:2.5rem; margin-bottom:10px;"></h2>
                    <p id="mLoc" style="color:var(--accent); font-weight:bold; margin-bottom:20px;"></p>
                    <p id="mDesc" style="line-height:1.8; color:#ccc;"></p>
                </div>

                <div class="form-side">
                    <h3>بيانات الحجز والدفع</h3>
                    <input type="text" id="custName" placeholder="الاسم بالكامل">
                    <div style="display:flex; gap:10px;">
                        <div style="flex:1"><label>وصول</label><input type="date" id="dateS" onchange="window.calc()"></div>
                        <div style="flex:1"><label>مغادرة</label><input type="date" id="dateE" onchange="window.calc()"></div>
                    </div>

                    <!-- اختيار وسيلة الدفع -->
                    <div class="pay-selector">
                        <label onclick="window.showPayFields('bank')">
                            <input type="radio" name="pay" id="payBank" checked>
                            <span><i class="fas fa-credit-card"></i> بطاقة بنكية</span>
                        </label>
                        <label onclick="window.showPayFields('wallet')">
                            <input type="radio" name="pay" id="payWallet">
                            <span><i class="fas fa-mobile-alt"></i> محفظة كاش</span>
                        </label>
                    </div>

                    <!-- خانات بيانات البنك -->
                    <div id="bankFields" class="payment-input-area active">
                        <input type="text" placeholder="رقم الكارت (16 رقم)">
                        <div style="display:flex; gap:10px;">
                            <input type="text" placeholder="MM/YY" style="flex:1">
                            <input type="text" placeholder="CVV" style="flex:1">
                        </div>
                    </div>

                    <!-- خانات بيانات المحفظة -->
                    <div id="walletFields" class="payment-input-area">
                        <input type="text" placeholder="رقم الموبايل (فودافون، اتصالات...)">
                    </div>

                    <div id="totalP" class="total-price">0 ج.م</div>
                    <button class="btn-confirm" onclick="window.confirmBooking()">تأكيد الحجز والدفع</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC2a6BpAGJMEtVBYPxQDIx-F6Z3qFLrBdQ",
            authDomain: "tourism-86a52.firebaseapp.com",
            projectId: "tourism-86a52",
            storageBucket: "tourism-86a52.firebasestorage.app",
            messagingSenderId: "227487436933",
            appId: "1:227487436933:web:44674ea483098e65c619ec",
            measurementId: "G-X4HXH0CJGY"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let hotelsOriginal = [];
        let hotelsDisplay = [];
        let selectedH = null;

        window.onload = async () => {
            const gS = await getDocs(collection(db, "governorates"));
            const f = document.getElementById('regionFilter');
            gS.forEach(doc => f.innerHTML += `<option value="${doc.data().name}">${doc.data().name}</option>`);

            const hS = await getDocs(collection(db, "hotels"));
            hS.forEach(doc => hotelsOriginal.push({id: doc.id, ...doc.data()}));
            hotelsDisplay = [...hotelsOriginal];
            render();
        };

        const render = () => {
            const grid = document.getElementById('hotelsGrid');
            grid.innerHTML = hotelsDisplay.map(h => `
                <div class="card" onclick="window.openM('${h.id}')">
                    <img src="${h.images && h.images[0] ? h.images[0] : 'https://via.placeholder.com/400x250'}">
                    <div class="card-body">
                        <h3 style="color:var(--gold)">${h.name}</h3>
                        <p>${h.city} - ${h.price} ج.م / ليلة</p>
                    </div>
                </div>
            `).join('');
        };

        window.filterHotels = () => {
            const t = document.getElementById('searchInput').value.toLowerCase();
            const g = document.getElementById('regionFilter').value;
            hotelsDisplay = hotelsOriginal.filter(h => h.name.toLowerCase().includes(t) && (g==="" || h.city===g));
            render();
        };

        window.openM = (id) => {
            selectedH = hotelsOriginal.find(h => h.id === id);
            document.getElementById('mName').innerText = selectedH.name;
            document.getElementById('mLoc').innerText = "📍 " + selectedH.city;
            document.getElementById('mDesc').innerText = selectedH.desc;
            document.getElementById('mGallery').innerHTML = selectedH.images.map(img => `<img src="${img}">`).join('');
            document.getElementById('bookModal').style.display = 'block';
        };

        window.closeM = () => document.getElementById('bookModal').style.display = 'none';

        window.showPayFields = (method) => {
            document.getElementById('bankFields').classList.toggle('active', method === 'bank');
            document.getElementById('walletFields').classList.toggle('active', method === 'wallet');
        };

        window.calc = () => {
            const s = new Date(document.getElementById('dateS').value);
            const e = new Date(document.getElementById('dateE').value);
            if(s && e && e > s) {
                const days = Math.ceil((e-s)/(1000*60*60*24));
                document.getElementById('totalP').innerText = (days * selectedH.price) + " ج.م";
            }
        };

        window.confirmBooking = async () => {
            const name = document.getElementById('custName').value;
            if(!name || document.getElementById('totalP').innerText === "0 ج.م") return alert("اكمل البيانات");
            await addDoc(collection(db, "bookings"), { hotel: selectedH.name, user: name, total: document.getElementById('totalP').innerText, at: new Date().toLocaleString() });
            alert("تم الحجز بنجاح!");
            location.reload();
        };
    </script>
</body>
</html>
